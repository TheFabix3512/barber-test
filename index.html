<!DOCTYPE html>
<html lang="es">
<head>

  <style>
    body {
       margin: 0;
  font-family: Arial, sans-serif;
  color: white;
  background: linear-gradient(rgba(0,0,0,0.7), rgba(0,0,0,0.7)),
  url('./Barberia/fondo.png') center center;
  background-size: cover;

    header {
      text-align: center;

    .servicios p {

    footer {
      background: black;

      padding: 15px;

    .whatsapp {

      right: 20px;
      background: #25D366;

      border-radius: 50px;
      text-decoration: none;
      color: white;
      font-weight: bold;

    /* FIX para celulares */
    @media (max-width: 768px) {
      header {

    }

</head>
